<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BLOODTHIRSTY</title>
    <style>
        /* ===== БАЗА ===== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', monospace;
            color: #00ff41;
            overflow: hidden;
        }
        #app {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            max-height: 900px;
            background: #0d0d0d;
            border: 1px solid #1a1a1a;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        .screen {
            display: none;
            flex-direction: column;
            width: 100%;
            height: 100%;
            padding: 20px;
            animation: fadeIn 0.3s ease;
        }
        .screen.active { display: flex; }
        @keyframes fadeIn {
            0% { opacity: 0; transform: scale(0.98); }
            100% { opacity: 1; transform: scale(1); }
        }
        /* ===== ПРИВЕТСТВИЕ ===== */
        #screen-welcome {
            justify-content: center;
            align-items: center;
            text-align: center;
            background: radial-gradient(circle at center, #1a0505, #0a0a0a);
        }
        .logo {
            font-size: 42px;
            font-weight: 900;
            color: #ff1a1a;
            text-shadow: 0 0 30px rgba(255, 0, 0, 0.7);
            letter-spacing: 4px;
            margin-bottom: 5px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        /* ===== ПОДПИСЬ РАЗРАБОТЧИКА ===== */
        .credit {
            color: #666;
            font-size: 10px;
            font-family: 'Courier New', monospace;
            letter-spacing: 1px;
            margin-top: 5px;
            margin-bottom: 30px;
            opacity: 0.7;
        }
        .credit span {
            color: #8B0000;
        }
        .credit .tg {
            color: #aa3333;
        }
        .btn {
            background: transparent;
            border: 1px solid #ff1a1a;
            color: #ff1a1a;
            padding: 14px 40px;
            font-size: 16px;
            font-family: 'Courier New', monospace;
            letter-spacing: 3px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }
        .btn:hover {
            background: #ff1a1a;
            color: #0a0a0a;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.3);
        }
        .btn:active { transform: scale(0.95); }
        /* ===== МЕНЮ ===== */
        #screen-menu {
            justify-content: center;
            align-items: center;
            gap: 20px;
            background: #0d0d0d;
        }
        .menu-title {
            font-size: 22px;
            color: #ff1a1a;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            max-width: 320px;
        }
        .menu-item {
            background: #111;
            border: 1px solid #2a2a2a;
            padding: 20px 10px;
            text-align: center;
            color: #00ff41;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-radius: 4px;
            letter-spacing: 1px;
        }
        .menu-item.active {
            border-color: #ff1a1a;
            background: #1a0505;
            color: #ff1a1a;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.15);
        }
        .menu-item:active { transform: scale(0.95); }
        .menu-item .icon { font-size: 28px; display: block; margin-bottom: 8px; }
        .btn-search { margin-top: 25px; width: 100%; max-width: 320px; }
        /* ===== ЗАГРУЗКА ===== */
        #screen-loading {
            justify-content: center;
            align-items: center;
            background: #0a0a0a;
            gap: 20px;
        }
        .loader-text {
            color: #8B0000;
            font-size: 14px;
            letter-spacing: 2px;
            opacity: 0.9;
            text-shadow: 0 0 20px rgba(139, 0, 0, 0.3);
            animation: none; /* Убираем тряску */
        }
        /* ===== ТЕРМИНАЛ ===== */
        #screen-terminal {
            padding: 15px;
            background: #0a0a0a;
        }
        .terminal-header {
            display: flex;
            gap: 10px;
            padding: 8px 12px;
            background: #111;
            border-bottom: 1px solid #1a1a1a;
            color: #666;
            font-size: 11px;
            letter-spacing: 1px;
        }
        .terminal-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            display: inline-block;
        }
        .terminal-dot.red { background: #ff1a1a; }
        .terminal-dot.yellow { background: #ffcc00; }
        .terminal-dot.green { background: #00ff41; }
        /* ===== КАРТОЧКА ТЕРМИНАЛА ===== */
        .terminal-card {
            padding: 0.5rem;
            overflow: hidden;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            background: #0a0a0a;
            margin-top: 15px;
        }
        .terminal-wrap {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            border: 0.5px solid #2a2a2a;
            border-radius: 8px;
            overflow: hidden;
        }
        .terminal-body {
            display: flex;
            flex-direction: column;
            padding: 1rem;
            line-height: 1.6;
            color: #00ff41;
            background: #0a0a0a;
            min-height: 200px;
            max-height: 400px;
            overflow-y: auto;
            font-size: 13px;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .terminal-body .line {
            opacity: 0;
            animation: type 0.3s forwards;
        }
        @keyframes type {
            0% { opacity: 0; transform: translateX(-10px); }
            100% { opacity: 1; transform: translateX(0); }
        }
        .terminal-body .highlight {
            color: #ff1a1a;
            font-weight: bold;
        }
        .terminal-body .found {
            color: #ffcc00;
        }
        .terminal-body::-webkit-scrollbar { width: 4px; }
        .terminal-body::-webkit-scrollbar-track { background: #0a0a0a; }
        .terminal-body::-webkit-scrollbar-thumb { background: #ff1a1a; border-radius: 2px; }
        /* ===== КНОПКА НАЗАД ===== */
        .btn-back {
            background: transparent;
            border: none;
            color: #666;
            font-size: 12px;
            padding: 10px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            letter-spacing: 1px;
            border-top: 1px solid #1a1a1a;
            width: 100%;
            text-align: center;
            margin-top: 10px;
        }
        .btn-back:active { color: #ff1a1a; }
        /* ===== ПОЛЕ ПОИСКА ===== */
        .searchBox {
            display: flex;
            max-width: 100%;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            background: #0a0a0a;
            border-radius: 50px;
            position: relative;
            border: 1px solid #1a1a1a;
            transition: all 0.3s ease;
        }
        .searchBox:focus-within {
            border-color: #8B0000;
            box-shadow: 0 0 20px rgba(139, 0, 0, 0.2);
        }
        .searchButton {
            color: white;
            position: absolute;
            right: 8px;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(90deg, #8B0000, #ff1a1a);
            border: 0;
            display: inline-block;
            transition: all 300ms cubic-bezier(.23, 1, 0.32, 1);
            cursor: pointer;
        }
        .searchButton:hover {
            background: linear-gradient(90deg, #ff1a1a, #8B0000);
            box-shadow: rgba(255, 0, 0, 0.5) 0 10px 20px;
            transform: translateY(-3px);
        }
        .searchButton:active {
            box-shadow: none;
            transform: translateY(0);
        }
        .searchInput {
            border: none;
            background: transparent;
            outline: none;
            color: #00ff41;
            font-size: 15px;
            padding: 24px 46px 24px 26px;
            width: 100%;
            font-family: 'Courier New', monospace;
        }
        .searchInput::placeholder {
            color: #444;
        }
        /* ===== ГЛАЗ С ПЛАМЕНЕМ ===== */
        .loader {
            display: flex;
            width: 8rem;
            height: 8rem;
            justify-items: center;
            justify-content: center;
            align-items: center;
            margin: 0 auto;
        }
        .head {
            width: 100%;
            height: 100%;
            background-color: #8B0000;
            border-radius: 50%;
            animation: move 3s linear infinite;
            box-shadow: 0 1rem 1rem #4a0000;
            filter: blur(.3rem);
            z-index: 1;
        }
        .eye {
            display: flex;
            position: absolute;
            width: 4rem;
            height: 4rem;
            background-color: #1a0505;
            border-radius: 50%;
            align-items: center;
            justify-content: center;
            z-index: 2;
            box-shadow: 0 0 1rem #8B0000;
            animation: move 5s alternate infinite;
        }
        .eye::before {
            content: "";
            display: flex;
            width: 1rem;
            height: 2rem;
            background-color: #ff1a1a;
            border-radius: 50%;
            animation: blink 4s ease-in-out alternate infinite;
        }
        .flames {
            display: flex;
            position: absolute;
            z-index: 0;
        }
        .particle {
            display: flex;
            position: absolute;
            background-color: #8B0000;
            border-radius: 50%;
            filter: blur(.3rem);
            border-top: 5px solid #4a0000;
            border-left: 5px solid #4a0000;
        }
        .flames::before {
            content: "";
            position: absolute;
            width: 8rem;
            height: 8rem;
            background: #8B0000;
            filter: blur(5rem);
            opacity: 0.3;
            border-radius: 50%;
            top: -8rem;
            left: -4rem;
            z-index: 4;
            animation: pulse 3s linear infinite;
        }
        .particle:nth-child(1) { width: 4rem; height: 4rem; top: -6rem; animation: move 7s alternate-reverse infinite; }
        .particle:nth-child(2) { width: 1.5rem; height: 1.5rem; top: -8rem; left: -5rem; animation: move 1.5s ease-in-out reverse infinite; }
        .particle:nth-child(3) { width: 4rem; height: 4rem; top: -5rem; left: -4rem; animation: move 8s alternate-reverse infinite; }
        .particle:nth-child(4) { width: 3rem; height: 3rem; top: -7.5rem; animation: move 4s alternate-reverse infinite; }
        .particle:nth-child(5) { width: 2rem; height: 2rem; top: -9rem; left: 1rem; animation: move 2.5s alternate-reverse infinite; }
        .particle:nth-child(6) { width: 2rem; height: 2rem; top: -6.8rem; left: -1.5rem; animation: move 5s alternate-reverse infinite; }
        .particle:nth-child(7) { width: 1rem; height: 1rem; top: -10rem; left: -1rem; animation: move 1.2s alternate-reverse infinite; }
        .particle:nth-child(8) { width: 1.3rem; height: 1.3rem; top: -7.5rem; left: -2rem; animation: move 2.5s alternate-reverse infinite; }
        @keyframes move {
            0% { transform: translate(0, 0); }
            50% { transform: translate(4px, 6px); }
            100% { transform: translate(0, 0); }
        }
        @keyframes blink {
            20% { transform: translate(0, 0); height: 2rem; }
            30% { height: 0; }
            40% { transform: translate(5px, 10px); height: 0; }
            50% { height: 2rem; }
            70% { transform: translate(-10px, -10px); }
            90% { transform: translate(0, 0); }
        }
        @keyframes pulse {
            0% { opacity: 0.3; }
            50% { opacity: 0.8; }
            100% { opacity: 0.3; }
        }
    </style>
</head>

    <script>
    // ============================================================
    // 1. УПРАВЛЕНИЕ ЭКРАНАМИ
    // ============================================================
    function showScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        const el = document.getElementById(id);
        if (el) el.classList.add('active');
    }

    document.getElementById('btnStart').addEventListener('click', () => showScreen('screen-menu'));
    document.getElementById('btnBack').addEventListener('click', () => showScreen('screen-menu'));

    // ============================================================
    // 2. МЕНЮ
    // ============================================================
    let selectedMode = 'tg';
    document.querySelectorAll('.menu-item').forEach(item => {
        item.addEventListener('click', function() {
            document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
            this.classList.add('active');
            selectedMode = this.dataset.mode;
        });
    });

    // ============================================================
    // 3. БАЗА ДАННЫХ
    // ============================================================
    let fullDatabase = [];

    async function loadDatabase() {
        try {
            const url = 'csvjson.json?_=' + Date.now();
            const response = await fetch(url, { cache: 'no-store', headers: { 'Cache-Control': 'no-cache' } });
            if (!response.ok) throw new Error('HTTP ' + response.status);
            const data = await response.json();
            if (Array.isArray(data) && data.length > 0) {
                fullDatabase = data;
                console.log('[+] База загружена:', fullDatabase.length, 'записей');
                return true;
            }
            throw new Error('Пустая база');
        } catch (e) {
            console.warn('Ошибка загрузки базы:', e);
            fullDatabase = [
                { name: 'Тестовый пользователь', phone: '79001234567', tg: '@test', email: 'test@mail.ru' },
                { name: 'Иванов Иван', phone: '79161234567', tg: '@ivanov', email: 'ivan@mail.ru' },
                { name: 'Петров Петр', phone: '79261234567', tg: '@petrov', email: 'petr@mail.ru' },
                { name: 'Сидоров Сидор', phone: '79361234567', tg: '@sidorov', email: 'sidor@mail.ru' }
            ];
            console.warn('[!] Используется резервная база');
            return false;
        }
    }

    // ============================================================
    // 4. ПОИСК
    // ============================================================
    async function runTerminalSimulation() {
        if (fullDatabase.length === 0) {
            await loadDatabase();
        }

        const input = document.getElementById('main-search-input');
        const output = document.getElementById('terminal-output');
        
        if (!input || !output) return;
        
        const query = input.value.trim();
        
        if (!query) {
            output.innerHTML = '[-] Введите данные для поиска.';
            return;
        }

        output.innerHTML = '';
        await typeText(output, '[>] Поиск...\n');
        
        const cleanInput = query.replace(/\D/g, '');
        const lowerQuery = query.toLowerCase();
        
        const results = fullDatabase.filter(item => {
            return Object.values(item).some(val => {
                const strVal = String(val);
                const cleanVal = strVal.replace(/\D/g, '');
                
                if (cleanInput.length > 0 && cleanVal.length > 0) {
                    if (cleanVal.includes(cleanInput)) return true;
                    if (cleanInput.length >= 10 && cleanVal.length >= 10) {
                        const inputLast10 = cleanInput.slice(-10);
                        const valLast10 = cleanVal.slice(-10);
                        if (inputLast10 === valLast10) return true;
                    }
                }
                
                if (strVal.toLowerCase() === lowerQuery) return true;
                if (strVal.toLowerCase().includes(lowerQuery)) return true;
                
                const words = lowerQuery.split(/\s+/);
                for (const word of words) {
                    if (word.length > 2 && strVal.toLowerCase().includes(word)) {
                        return true;
                    }
                }
                
                return false;
            });
        });
        
        await sleep(200);
        
        if (results.length === 0) {
            await typeText(output, '[-] Совпадений по запросу "' + query + '" не найдено.');
            return;
        }
        
        await typeText(output, '[+] НАЙДЕНО: ' + results.length + ' записей\n');
        await sleep(150);
        
        results.forEach((item, index) => {
            const entries = Object.entries(item);
            const parts = entries.map(([key, val]) => {
                let displayVal = String(val);
                if (displayVal.toLowerCase().includes(lowerQuery)) {
                    const regex = new RegExp(`(${lowerQuery})`, 'gi');
                    displayVal = displayVal.replace(regex, '<span class="highlight">$1</span>');
                }
                return `<span style="color:#00ff41;">${key}:</span> ${displayVal}`;
            });
            const line = `[${index + 1}] ` + parts.join(' | ') + '\n';
            setTimeout(() => {
                output.innerHTML += line;
                output.scrollTop = output.scrollHeight;
            }, 100 * (index + 1));
        });
        
        setTimeout(() => {
            output.innerHTML += '\n[>] Поиск завершён.';
            output.scrollTop = output.scrollHeight;
        }, 150 * results.length + 200);
    }

    // ============================================================
    // 5. ФУНКЦИЯ ПЕЧАТАЮЩЕГОСЯ ТЕКСТА
    // ============================================================
    async function typeText(element, text) {
        return new Promise((resolve) => {
            let index = 0;
            const interval = setInterval(() => {
                if (index < text.length) {
                    const char = text[index];
                    if (char === '\n') {
                        element.innerHTML += '<br>';
                    } else if (char === ' ') {
                        element.innerHTML += ' ';
                    } else {
                        element.innerHTML += char;
                    }
                    index++;
                    element.scrollTop = element.scrollHeight;
                } else {
                    clearInterval(interval);
                    resolve();
                }
            }, 50);
        });
    }

    function sleep(ms) {
        return new Promise(resolve => setTimeout(resolve, ms));
    }
