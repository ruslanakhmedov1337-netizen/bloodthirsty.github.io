            margin: 0; 
            padding: 20px; 
            box-sizing: border-box; 
            overflow-x: hidden; 
        }

            color: white;

            font-size: 15px; 
            margin-top: 20px;

            box-shadow: var(--hover-shadows); 
        }
        button:active { 
            background-color: var(--accent); 
            transform: scale(0.95); 
        }

            margin: 15px auto; 
            background: none;

        .loading-text {
            color: fuchsia;

        #screen-terminal { 
            display: none; 
            width: 100%; 
            text-align: left; 
        }

            background-color: #0d0d0d; 
            border: 1px solid #333; 
            border-radius: 12px; 
            padding: 20px; 
            min-height: 200px; 
            font-size: 13px; 
            line-height: 1.5; 
            color: #00ff66; 
            word-wrap: break-word; 
        }
