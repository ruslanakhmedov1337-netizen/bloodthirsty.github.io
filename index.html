<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>bloodthirsty // OSINT SYSTEM</title>
    <style>
        body { background-color: #1a1a1a; color: #ffffff; font-family: 'Courier New', monospace; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .main-container { width: 100%; max-width: 500px; text-align: center; }
        .input { margin: 15px auto; background: none; border: none; outline: none; width: 100%; max-width: 260px; padding: 12px 20px; border-radius: 9999px; box-shadow: inset 2px 5px 10px #000; color: #fff; text-align: center; }
        button { border: none; border-radius: 1.1em; background-color: #212121; color: white; padding: 1em 2em; cursor: pointer; box-shadow: 8px 8px 15px #141414; margin-top: 10px; }
        #screen-menu, #screen-loading, #screen-terminal { display: none; }
        .terminal-box { background-color: #0d0d0d; border: 1px solid #333; padding: 20px; text-align: left; color: #00ff66; min-height: 200px; border-radius: 12px; font-size: 13px; }
    </style>
</head>
<body>
    <div class="main-container">
        <div id="screen-welcome"><button onclick="goToMenu()">НАЧАТЬ ПОИСК</button></div>
        <div id="screen-menu">
            <input placeholder="Введите номер (например 380...)" class="input" type="text" id="main-search-input">
            <button onclick="startLoading()">ЗАПУСТИТЬ ПОИСК</button>
        </div>
        <div id="screen-loading">Загрузка...</div>
        <div id="screen-terminal">
            <div class="terminal-box" id="terminal-output"></div>
            <button onclick="location.reload()">СБРОС</button>
        </div>
    </div>

    <script>
        let fullDatabase = [];
        // Грузим базу
        fetch('csvjson.json').then(r => r.json()).then(data => fullDatabase = data);

        function goToMenu() { document.getElementById('screen-welcome').style.display = 'none'; document.getElementById('screen-menu').style.display = 'block'; }
        
        function startLoading() {
            document.getElementById('screen-menu').style.display = 'none';
            document.getElementById('screen-loading').style.display = 'block';
            setTimeout(runTerminalSimulation, 1500);
        }

        function runTerminalSimulation() {
            document.getElementById('screen-loading').style.display = 'none';
            document.getElementById('screen-terminal').style.display = 'block';
            const input = document.getElementById('main-search-input').value.trim();
            const output = document.getElementById('terminal-output');
            
            const found = fullDatabase.find(item => String(item.phone) === input);
            
            if (found) {
                let res = "[+] ДАННЫЕ НАЙДЕНЫ:<br>----------------<br>";
                for (let key in found) {
                    if (key !== "id") res += `• ${key}: ${found[key] || '—'}<br>`;
                }
                output.innerHTML = res;
            } else {
                output.innerHTML = "[-] Совпадений не найдено.";
            }
        }
    </script>
</body>
</html>
