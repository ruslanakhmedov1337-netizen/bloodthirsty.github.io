<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bloodthirsty // OSINT SYSTEM</title>
    <style>
        body {
            background-color: #0d0d0d;
            color: #00ff66;
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .terminal {
            width: 100%;
            max-width: 600px;
            background: #151515;
            border: 1px solid #00ff66;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 0 20px rgba(0, 255, 102, 0.2);
        }
        .header {
            text-align: center;
            border-bottom: 1px solid #00ff66;
            padding-bottom: 10px;
            margin-bottom: 20px;
            color: #ff0055;
            font-size: 20px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 0, 85, 0.3);
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }
        input {
            background: #222;
            border: 1px solid #00ff66;
            padding: 12px;
            color: #fff;
            font-family: monospace;
            font-size: 16px;
            border-radius: 4px;
            outline: none;
            text-align: center;
        }
        button {
            background: #00ff66;
            color: #000;
            border: none;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            font-family: monospace;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.3s ease;
        }
        button:hover {
            background: #ff0055;
            color: #fff;
            box-shadow: 0 0 15px #ff0055;
        }
        .output-box {
            background: #000;
            border: 1px dashed #00ff66;
            padding: 15px;
            min-height: 150px;
            white-space: pre-wrap;
            font-size: 14px;
            color: #00ff66;
            max-height: 300px;
            overflow-y: auto;
        }
        .system-log { color: #888; }
        .success-log { color: #ffff00; font-weight: bold; }
    </style>
</head>
<body>

<div class="terminal">
    <div class="header">🩸 bloodthirsty // OSINT SYSTEM v2.0</div>
    
    <div class="input-group">
        <input type="text" id="targetInput" placeholder="Введите телефон, ник или ID...">
        <button onclick="startOsintSearch()">ЗАПУСТИТЬ ПОИСК</button>
    </div>

    <div class="output-box" id="terminalOutput">_ Ожидание ввода цели...</div>
</div>

<script>
function sleep(ms) {
    return new Promise(resolve => setTimeout(resolve, ms));
}

async function startOsintSearch() {
    const input = document.getElementById('targetInput').value.trim();
    const output = document.getElementById('terminalOutput');
    
    if (!input) {
        output.innerHTML = "<span style='color: #ff0055;'>[!] Ошибка: Поле ввода пустое.</span>";
        return;
    }

    output.innerHTML = "";
    
    // Эмуляция загрузки модулей точно как в твоем osint.py
    const logs = [
        `[+] Инициализация модулей osint.py...`,
        `[+] Подключение к базам данных заняло 0.43 сек.`,
        `[*] Поиск по цели: ${input}`,
        `[~] Сканирование открытых источников (РФ/СНГ)...`,
        `[~] Проверка привязанных соцсетей (ТГ, ВК, Инста)...`,
        `[~] Запрос к архивам утечек паролей...`
    ];

    for (let log of logs) {
        output.innerHTML += `<div class="system-log">${log}</div>`;
        output.scrollTop = output.scrollHeight;
        await sleep(600);
    }

    await sleep(1000);

    // Логика генерации данных на основе ввода (как в твоем скрипте)
    let country = "Определяется...";
    let operator = "Поиск...";
    let fakeCity = ["Москва", "Санкт-Петербург", "Краснодар", "Новосибирск", "Екатеринбург", "Минск"][Math.floor(Math.random() * 6)];
    let fakeAge = Math.floor(Math.random() * (35 - 18 + 1)) + 18;
    
    if (input.includes('+7') || input.startsWith('8')) {
        country = "Российская Федерация 🇷🇺";
        operator = ["МТС", "Билайн", "МегаФон", "Теле2", "Тинькофф Мобайл"][Math.floor(Math.random() * 5)];
    } else {
        country = "СНГ / Международный формат";
        operator = "Глобальный провайдер";
    }

    // Финальный вывод структуры данных из osint.py
    output.innerHTML += `
<hr style="border-color: #00ff66;">
<div class="success-log">🎯 ДАННЫЕ НАЙДЕНЫ В БАЗЕ:</div>
----------------------------------------
[•] Страна: ${country}
[•] Регион/Город: ${fakeCity}
[•] Провайдер/Оператор: ${operator}
[•] Возраст владельца (приблиз.): ${fakeAge} лет
[•] Статус аккаунта: Активен
[•] Найдено совпадений в утечках: ${Math.floor(Math.random() * 4) + 1}
----------------------------------------
<span style="color: #ffff00;">[+] Скрипт osint.py успешно завершил работу.</span>`;
    
    output.scrollTop = output.scrollHeight;
}
</script>

</body>
</html>
